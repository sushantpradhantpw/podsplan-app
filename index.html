/* Touch drag ghost */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  opacity:0.85;transform:scale(1.04);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  border-radius:10px;transition:none;
}
/* Drop target highlight */
.drop-active{
  outline:2px solid #E94560 !important;
  background:rgba(233,69,96,0.08) !important;
}

    onChange={e=>cb.current(e.target.value)}

// ── CALENDAR TAB — TOUCH DRAG (works on iOS Safari)
// Architecture:
// - Free-form: weeks can have any number of episodes (not locked to 3)
// - Touch drag uses onTouchStart/Move/End with a floating ghost element
// - Drop detection uses document.elementFromPoint on touchmove
// - No HTML5 drag API used at all
const CalendarTab=memo(({eps,slots,activeId,onSelect,onMoveEp,onRemoveFromSlot})=>{
  const T=useT();
  // slots: { weekNum: [epId, epId, ...] }  (week 1-4, flexible count)
  const ghostRef=useRef(null);
  const dragState=useRef(null); // {epId, fromWeek, fromIdx, startX, startY}
  const dropIndicator=useRef(null);

  // All ep ids currently in calendar
  const inCal=new Set(Object.values(slots).flat().filter(Boolean));
  const unscheduled=eps.filter(e=>!inCal.has(e.id));

  // Build ghost element for touch drag
  const createGhost=(el,ep)=>{
    const rect=el.getBoundingClientRect();
    const ghost=el.cloneNode(true);
    ghost.className="drag-ghost";
    ghost.style.width=rect.width+"px";
    ghost.style.height=rect.height+"px";
    ghost.style.left=rect.left+"px";
    ghost.style.top=rect.top+"px";
    document.body.appendChild(ghost);
    ghostRef.current=ghost;
  };

  const moveGhost=(x,y)=>{
    if(!ghostRef.current)return;
    const ghost=ghostRef.current;
    const w=parseFloat(ghost.style.width);
    const h=parseFloat(ghost.style.height);
    ghost.style.left=(x-w/2)+"px";
    ghost.style.top=(y-h/2)+"px";
  };

  const removeGhost=()=>{
    if(ghostRef.current){document.body.removeChild(ghostRef.current);ghostRef.current=null;}
    // Clear all drop highlights
    document.querySelectorAll(".drop-active").forEach(el=>el.classList.remove("drop-active"));
  };

  const getDropTarget=(x,y)=>{
    if(ghostRef.current)ghostRef.current.style.display="none";
    const el=document.elementFromPoint(x,y);
    if(ghostRef.current)ghostRef.current.style.display="";
    if(!el)return null;
    const slot=el.closest("[data-dropzone]");
    return slot?slot.dataset.dropzone:null;
  };

  const handleTouchStart=(e,epId,fromWeek,fromIdx)=>{
    e.stopPropagation();
    const touch=e.touches[0];
    dragState.current={epId,fromWeek,fromIdx,startX:touch.clientX,startY:touch.clientY,moved:false};
    const cardEl=e.currentTarget;
    // Delay ghost creation slightly so tap vs drag can be distinguished
    dragState.current.timer=setTimeout(()=>{
      createGhost(cardEl,eps.find(ep=>ep.id===epId));
      dragState.current.dragging=true;
    },120);
  };

  const handleTouchMove=(e)=>{
    if(!dragState.current)return;
    const touch=e.touches[0];
    dragState.current.moved=true;
    if(!dragState.current.dragging)return;
    e.preventDefault();
    moveGhost(touch.clientX,touch.clientY);
    // Highlight drop target
    document.querySelectorAll(".drop-active").forEach(el=>el.classList.remove("drop-active"));
    const dz=getDropTarget(touch.clientX,touch.clientY);
    if(dz){
      const el=document.querySelector(`[data-dropzone="${dz}"]`);
      if(el)el.classList.add("drop-active");
    }
  };

  const handleTouchEnd=(e)=>{
    if(!dragState.current)return;
    clearTimeout(dragState.current.timer);
    if(!dragState.current.dragging){
      dragState.current=null;return;
    }
    const touch=e.changedTouches[0];
    const dz=getDropTarget(touch.clientX,touch.clientY);
    const {epId,fromWeek,fromIdx}=dragState.current;
    removeGhost();
    dragState.current=null;
    if(!dz)return;
    if(dz==="pool"){
      if(fromWeek!=null)onRemoveFromSlot(epId,fromWeek,fromIdx);
    } else {
      const wk=parseInt(dz.replace("week-",""));
      if(!isNaN(wk))onMoveEp(epId,fromWeek,fromIdx,wk);
    }
  };

  const weeks=[1,2,3,4];

  return(
    <div style={{padding:"16px 16px 80px"}}
      onTouchMove={e=>{if(dragState.current?.dragging)e.preventDefault();}}
    >
      <div style={{fontSize:10,color:T.faint,fontWeight:600,marginBottom:14,
        letterSpacing:1,textTransform:"uppercase"}}>
        Hold and drag to move · tap to edit
      </div>

      {/* Unscheduled pool */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,fontWeight:800,color:T.faint,letterSpacing:1.5,
          textTransform:"uppercase",marginBottom:8}}>Not scheduled</div>
        <div data-dropzone="pool"
          style={{display:"flex",flexWrap:"wrap",gap:8,background:T.pool,
            border:`1.5px dashed ${T.border}`,borderRadius:10,padding:12,minHeight:52,
            transition:"border-color 0.15s,background 0.15s"}}>
          {unscheduled.length===0&&(
            <span style={{fontSize:11,color:T.faint,fontStyle:"italic",alignSelf:"center"}}>
              All episodes scheduled</span>
          )}
          {unscheduled.map(ep=>{
            const c=gc(ep.cat);
            return(
              <div key={ep.id}
                onTouchStart={e=>handleTouchStart(e,ep.id,null,null)}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
                onClick={()=>onSelect(ep.id)}
                style={{background:T.card,border:`1.5px solid ${cbd(c,T.dark)}`,
                  borderRadius:8,padding:"6px 10px",cursor:"grab",userSelect:"none",
                  display:"flex",alignItems:"center",gap:7,boxShadow:T.shadow,
                  touchAction:"none"}}>
                <span style={{fontSize:13}}>{c.emoji}</span>
                <div>
                  <div style={{fontSize:9,fontWeight:800,color:c.color,textTransform:"uppercase"}}>{ep.sub}</div>
                  <div style={{fontSize:11,fontWeight:ep.guest?700:500,
                    color:ep.guest?T.text:T.faint,fontStyle:ep.guest?"normal":"italic"}}>
                    {ep.guest||"No guest"}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Week rows — flexible episode count */}
      {weeks.map(wk=>{
        const wkEps=(slots[wk]||[]).map(id=>eps.find(e=>e.id===id)).filter(Boolean);
        return(
          <div key={wk} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:800,color:"#E94560",
                letterSpacing:2,textTransform:"uppercase",flexShrink:0}}>Week {wk}</div>
              <div style={{flex:1,height:1,background:T.border}}/>
              <span style={{fontSize:10,color:T.faint,fontWeight:600}}>{wkEps.length} ep</span>
            </div>
            <div data-dropzone={`week-${wk}`}
              style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",
                gap:8,minHeight:90,padding:8,borderRadius:10,
                border:`1.5px dashed ${T.border}`,background:T.pool,
                transition:"border-color 0.15s,background 0.15s"}}>
              {wkEps.length===0&&(
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",
                  gridColumn:"1/-1",fontSize:11,color:T.faint,fontStyle:"italic"}}>
                  Drop episodes here
                </div>
              )}
              {wkEps.map((ep,idx)=>(
                <div key={ep.id}
                  onTouchStart={e=>handleTouchStart(e,ep.id,wk,idx)}
                  onTouchMove={handleTouchMove}
                  onTouchEnd={handleTouchEnd}>
                  <EpCard ep={ep} isActive={activeId===ep.id} onClick={()=>onSelect(ep.id)}/>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
});

// ── ANALYSIS TAB
const Analysis=memo(({eps})=>{
  const T=useT();
  const tgt={bigmind:6,celebrity:1,struggle:1,achievement:1,casual:2,health:1};
  const act={};const subC={};
  eps.forEach(e=>{act[e.cat]=(act[e.cat]||0)+(e.guest?1:0);if(e.guest)subC[e.sub]=(subC[e.sub]||0)+1;});
  const tgtSub={Geopolitics:2,Economy:1,"Nepal Politics":1,History:1,Academic:1};
  const issues=[];
  CATS.forEach(c=>{const a=act[c.id]||0,t=tgt[c.id];
    if(a<t)issues.push({type:"under",msg:`${c.emoji} ${c.name}: ${a}/${t} — missing ${t-a}`});
    if(a>t)issues.push({type:"over",msg:`${c.emoji} ${c.name}: ${a}/${t} — ${a-t} over target`});
  });
  Object.entries(tgtSub).forEach(([s,t])=>{const a=subC[s]||0;
    if(a!==t)issues.push({type:a<t?"under":"over",msg:`${s}: ${a}/${t} episodes`});
  });
  return(
    <div style={{padding:"16px 16px 80px"}}>
      <div style={{fontSize:11,fontWeight:800,color:T.faint,letterSpacing:2,
        textTransform:"uppercase",marginBottom:12}}>Category Targets</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
        {CATS.map(c=>{const a=act[c.id]||0,t=tgt[c.id];const pct=Math.min(100,a/t*100);
          const over=a>t,done=a===t;
          return(
            <div key={c.id} style={{background:T.card,borderRadius:10,padding:"12px 14px",
              border:`1px solid ${done?"#00A88444":over?"#E9456044":T.border}`,boxShadow:T.shadow}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:14}}>{c.emoji}</span>
                  <span style={{fontSize:12,fontWeight:700,color:T.text}}>{c.name}</span>
                </div>
                <span style={{fontSize:12,fontWeight:800,color:done?"#00A884":over?"#E94560":T.sub}}>{a}/{t}</span>
              </div>
              <div style={{height:4,background:T.dark?"#0f0f1a":"#E8E5DC",borderRadius:4,overflow:"hidden",marginBottom:c.id==="bigmind"?8:0}}>
                <div style={{height:"100%",width:`${pct}%`,background:done?"#00A884":over?"#E94560":c.color,borderRadius:4,transition:"width 0.3s"}}/>
              </div>
              {c.id==="bigmind"&&(
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {Object.entries(tgtSub).map(([s,t])=>{const a=subC[s]||0;return(
                    <span key={s} style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:12,
                      background:a===t?(T.dark?"#00A88422":"#EDFAF6"):a>t?(T.dark?"#E9456022":"#FFF0F2"):T.dark?"#ffffff08":"#F0EDE5",
                      color:a===t?"#00A884":a>t?"#E94560":T.faint,
                      border:`1px solid ${a===t?"#00A88433":a>t?"#E9456033":T.border}`}}>
                      {s} {a}/{t}
                    </span>);
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {issues.length===0?(
        <div style={{background:T.dark?"#031a14":"#EDFAF6",border:"1px solid #00A88433",borderRadius:12,padding:"20px",textAlign:"center"}}>
          <div style={{fontSize:24,marginBottom:8}}>🎯</div>
          <div style={{fontSize:14,fontWeight:700,color:"#00A884"}}>Perfect balance — all targets hit</div>
        </div>
      ):(
        <div>
          <div style={{fontSize:11,fontWeight:800,color:T.faint,letterSpacing:2,
            textTransform:"uppercase",marginBottom:10}}>Issues to fix</div>
          {issues.map((iss,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",
              background:iss.type==="under"?(T.dark?"#1a0f00":"#FFF6EC"):T.dark?"#1a040a":"#FFF0F2",
              borderRadius:9,marginBottom:6,
              border:`1px solid ${iss.type==="under"?"#F5820D44":"#E9456044"}`}}>
              <span style={{fontSize:14}}>{iss.type==="under"?"⚠️":"🔴"}</span>
              <span style={{fontSize:12,color:iss.type==="under"?"#F5820D":"#E94560",fontWeight:600}}>{iss.msg}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
});

// ── REPORT GENERATOR — sorts by filmDate, produces light + dark HTML
const buildReport=(eps,slots,month,logoB64,dark)=>{

  var statBg=dark?"#13131f":"#FFFFFF";

  // Build week-order map: epId -> week number
  var weekOrder={};

  // Category counts for analysis
  var catCounts={};

      subCounts[e.sub]=(subCounts[e.sub]||0)+1;
    }

  var confirmed=eps.filter(function(e){return e.guest;}).length;

  var openSlots=eps.filter(function(e){return !e.guest;}).length;
  var monthLabel=month||"Monthly Plan";
  var genDate=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

      var ep=null;
      for(var ei=0;ei<eps.length;ei++){if(eps[ei].id===wkIds[ii]){ep=eps[ei];break;}}

    // Decide grid columns: 1 ep = 1col, 2 eps = 2col, 3+ = 3col

    var cardHtml="";

      var filmedBadge=ep.filmed?'<div style="position:absolute;top:8px;right:8px;font-size:8px;font-weight:800;padding:2px 6px;border-radius:8px;background:#00A88422;color:#00A884;border:1px solid #00A88433">'+String.fromCodePoint(10003)+' Filmed</div>':"";

  // Analysis section — category balance + sub-category breakdown

      '<span style="font-size:9px;color:#F5820D;font-weight:700">'+cat.name+' '+a+'/'+t+'</span></div>';
    if(a>t)issuesHtml+='<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;background:#E9456022;border:1px solid #E9456044;margin:3px">'+
      '<span style="font-size:10px">'+String.fromCodePoint(128308)+'</span>'+
      '<span style="font-size:9px;color:#E94560;font-weight:700">'+cat.name+' '+a+'/'+t+'</span></div>';
  }
  var subKeys2=Object.keys(tgtSub);
  for(var si=0;si<subKeys2.length;si++){
    var sub=subKeys2[si];var a=subCounts[sub]||0;var t=tgtSub[sub];
    if(a!==t)issuesHtml+='<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;background:'+(a<t?"#F5820D22":"#E9456022")+';border:1px solid '+(a<t?"#F5820D44":"#E9456044")+';margin:3px">'+
      '<span style="font-size:9px;color:'+(a<t?"#F5820D":"#E94560")+';font-weight:700">'+sub+' '+a+'/'+t+'</span></div>';
  }
  if(!issuesHtml)issuesHtml='<div style="font-size:11px;color:#00A884;font-weight:700">'+String.fromCodePoint(127919)+' All targets hit</div>';

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:-apple-system,Helvetica,sans-serif;background:'+bg+';color:'+textC+'}'
    +'.page{width:860px;margin:0 auto;padding:44px 40px}'
    +'@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.page{padding:32px 28px}}'
    +'</style>'
    +'<script>window.onload=function(){setTimeout(function(){window.print();},600);}<\/script>'

    +'<div style="font-size:9px;font-weight:800;letter-spacing:4px;color:#E94560;text-transform:uppercase;margin-bottom:4px">Sushant Pradhan Podcast</div>'

    +'</div>'
    +'</div>'

    // Stats

    +'<div style="font-size:22px;font-weight:900;color:#4361EE;margin-bottom:2px">'+confirmed+'</div>'
    +'<div style="font-size:8px;font-weight:700;color:'+subC+';text-transform:uppercase;letter-spacing:1.5px">Confirmed</div>'
    +'</div>'
    +'<div style="background:'+statBg+';border:1px solid '+borderC+';border-radius:11px;padding:12px 14px;flex:1;text-align:center">'
    +'<div style="font-size:22px;font-weight:900;color:#00A884;margin-bottom:2px">'+filmedCount+'</div>'
    +'<div style="font-size:8px;font-weight:700;color:'+subC+';text-transform:uppercase;letter-spacing:1.5px">Filmed</div>'
    +'</div>'
    +'<div style="background:'+statBg+';border:1px solid '+borderC+';border-radius:11px;padding:12px 14px;flex:1;text-align:center">'

    +'</div>'
    +'</div>'

    // Week blocks
    +'<div style="font-size:9px;font-weight:800;color:'+subC+';letter-spacing:3px;text-transform:uppercase;margin-bottom:14px">Episode Schedule</div>'
    +weekHtml

    // Analysis
    +'<div style="margin-top:24px;padding-top:20px;border-top:1px solid '+borderC+'">'
    +'<div style="font-size:9px;font-weight:800;color:'+subC+';letter-spacing:3px;text-transform:uppercase;margin-bottom:14px">Category Analysis</div>'

    // Category balance
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    +'<div>'
    +'<div style="font-size:9px;font-weight:700;color:'+subC+';letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">By Category</div>'
    +catBalHtml
    +'</div>'
    +'<div>'
    +'<div style="font-size:9px;font-weight:700;color:'+subC+';letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">BIG MIND Breakdown</div>'
    +subBalHtml
    +'<div style="margin-top:12px">'
    +'<div style="font-size:9px;font-weight:700;color:'+subC+';letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Issues / Flags</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:0">'+issuesHtml+'</div>'
    +'</div>'
    +'</div>'
    +'</div>'
    +'</div>'

    // Footer
    +'<div style="margin-top:20px;padding-top:14px;border-top:1px solid '+borderC+';display:flex;justify-content:space-between;align-items:center">'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<img style="width:18px;height:18px;border-radius:50%;object-fit:cover;opacity:0.35" src="data:image/png;base64,'+logoB64+'" alt="">'
    +'<div style="font-size:8px;color:'+emptyC+';font-weight:700;letter-spacing:1px">PODSPLAN &middot; SUSHANT PRADHAN PODCAST &middot; CONFIDENTIAL</div>'
    +'</div>'
    +'<div style="font-size:8px;color:'+emptyC+'">Generated '+genDate+'</div>'
    +'</div>'

    +'</div></body></html>';
};

const openReport=(eps,slots,month,logoB64,dark)=>{
  const html=buildReport(eps,slots,month,logoB64,dark);
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.target="_blank";a.rel="noopener noreferrer";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  // Auto-print after tab loads
  setTimeout(()=>URL.revokeObjectURL(url),15000);
};

// ── TOPBAR — stable month input
const TopBar=memo(({month,setMonth,dark,setDark,tab,setTab,
  onDark,onLight,onExport,onImport,onReset,filled,filmed,fileRef})=>{
  const T=useT();
  const mRef=useRef();
  useEffect(()=>{if(mRef.current&&mRef.current!==document.activeElement)mRef.current.value=month??"";},[month]);
  return(
    <div style={{background:T.bar,borderBottom:`1px solid ${T.barBorder}`,
      padding:"10px 14px",display:"flex",alignItems:"center",
      justifyContent:"space-between",flexWrap:"wrap",gap:8,
      position:"sticky",top:0,zIndex:300,
      boxShadow:dark?"none":"0 1px 8px rgba(0,0,0,0.07)"}}>
      {/* Brand */}
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <img src={"data:image/png;base64,"+ICON_B64} alt="Podsplan"
          style={{width:36,height:36,borderRadius:"20%",objectFit:"cover",flexShrink:0}}/>
        <div>
          <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:"#E94560",
            textTransform:"uppercase",marginBottom:1}}>Sushant Pradhan Podcast</div>
          <div style={{fontSize:14,fontWeight:900,color:T.text,letterSpacing:-0.3}}>Podsplan</div>
        </div>
      </div>
      {/* Controls */}
      <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
        <input ref={mRef} defaultValue={month} placeholder="e.g. July 2026"
          onChange={e=>setMonth(e.target.value)}
          style={{background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:6,
            padding:"5px 9px",fontSize:11,fontWeight:700,color:T.text,outline:"none",width:115}}/>
        <div style={{display:"flex",gap:2,background:T.inp,borderRadius:7,padding:3,
          border:`1px solid ${T.inpB}`}}>
          {[["guests","📋"],["calendar","📅"],["analysis","📊"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{background:tab===id?"#E94560":"transparent",
                color:tab===id?"#fff":T.sub,border:"none",borderRadius:5,
                padding:"4px 9px",fontSize:11,fontWeight:700,cursor:"pointer",
                transition:"all 0.15s"}}>{lbl} {id==="guests"?"Guests":id==="calendar"?"Calendar":"Analysis"}</button>
          ))}
        </div>
        <button onClick={()=>setDark(d=>!d)}
          style={{background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:6,
            padding:"6px 9px",fontSize:13,cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
        {/* Report dropdown */}
        <div style={{position:"relative",display:"inline-block"}}>
          <button id="rptbtn"
            style={{background:"linear-gradient(135deg,#4361EE,#F72585)",color:"#fff",
              border:"none",borderRadius:6,padding:"6px 11px",fontSize:10,fontWeight:700,cursor:"pointer"}}
            onClick={()=>{
              const m=document.getElementById("rptmenu");
              m.style.display=m.style.display==="block"?"none":"block";
            }}>✨ Report ▾</button>
          <div id="rptmenu" style={{display:"none",position:"absolute",right:0,top:"110%",
            background:T.bar,border:`1px solid ${T.barBorder}`,borderRadius:8,
            overflow:"hidden",zIndex:400,minWidth:140,boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
            <div onClick={()=>{onDark();document.getElementById("rptmenu").style.display="none";}}
              style={{padding:"10px 14px",fontSize:12,fontWeight:600,color:T.text,cursor:"pointer",
                borderBottom:`1px solid ${T.barBorder}`}}>🌙 Dark Report</div>
            <div onClick={()=>{onLight();document.getElementById("rptmenu").style.display="none";}}
              style={{padding:"10px 14px",fontSize:12,fontWeight:600,color:T.text,cursor:"pointer"}}>☀️ Light Report</div>
          </div>
        </div>
        <button onClick={onExport}
          style={{background:"#00A884",color:"#fff",border:"none",borderRadius:6,
            padding:"6px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>↓ Export</button>
        <button onClick={onImport}
          style={{background:"#4361EE",color:"#fff",border:"none",borderRadius:6,
            padding:"6px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>↑ Import</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}}/>
        <button onClick={onReset}
          style={{background:T.inp,color:T.faint,border:`1px solid ${T.inpB}`,
            borderRadius:6,padding:"6px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Reset</button>
        <div style={{background:"#E94560",color:"#fff",borderRadius:6,
          padding:"6px 10px",fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>
          {filled}/12 · {filmed}✓</div>
      </div>
    </div>
  );
});

// ── APP — only state and handlers here, no JSX components defined inside
function App(){
  const saved=restore();
  const initEps=useCallback(()=>saved?.eps||mkEps(),[]);
  const initSlots=useCallback(()=>{
    if(saved?.slots)return saved.slots;
    // Default: put eps into 4 weeks, 3 each
    const eps=saved?.eps||mkEps();
    const s={1:[],2:[],3:[],4:[]};
    eps.forEach((ep,i)=>{const wk=Math.floor(i/3)+1;if(wk<=4)s[wk].push(ep.id);});
    return s;
  },[]);

  const[eps,setEps]=useState(initEps);
  const[slots,setSlots]=useState(initSlots);
  const[month,setMonth]=useState(saved?.month||"");
  const[dark,setDark]=useState(saved?.dark!==undefined?saved.dark:true);
  const[activeId,setActiveId]=useState(null);
  const[tab,setTab]=useState("guests");
  const[toast,setToast]=useState("");
  const fileRef=useRef();

  const T=mkT(dark);

  useEffect(()=>{
    document.body.style.background=T.bg;
    save({eps,slots,month,dark});
  },[eps,slots,month,dark,T.bg]);

  // Close report menu when clicking outside
  useEffect(()=>{
    const h=e=>{
      const menu=document.getElementById("rptmenu");
      const btn=document.getElementById("rptbtn");
      if(menu&&btn&&!btn.contains(e.target)&&!menu.contains(e.target)){
        menu.style.display="none";
      }
    };
    document.addEventListener("click",h);
    return()=>document.removeEventListener("click",h);
  },[]);

  const showToast=useCallback(m=>{setToast(m);setTimeout(()=>setToast(""),2200);},[]);

  const updateEp=useCallback((id,patch)=>{
    setEps(prev=>prev.map(e=>e.id===id?{...e,...patch}:e));
  },[]);

  const handleSelect=useCallback(id=>{
    setActiveId(prev=>prev===id?null:id);
  },[]);

  const handleClose=useCallback(()=>setActiveId(null),[]);

  const handleUpdate=useCallback(patch=>{
    setActiveId(id=>{updateEp(id,patch);return id;});
  },[updateEp]);

  // Move ep to a week — removes from old week, adds to new
  const handleMoveEp=useCallback((epId,fromWeek,fromIdx,toWeek)=>{
    setSlots(prev=>{
      const next={1:[...(prev[1]||[])],2:[...(prev[2]||[])],3:[...(prev[3]||[])],4:[...(prev[4]||[])]};
      // Remove from source
      if(fromWeek!=null){
        next[fromWeek]=next[fromWeek].filter(id=>id!==epId);
      } else {
        // From unscheduled pool — just add
      }
      // Add to target if not already there
      if(!next[toWeek].includes(epId)){
        next[toWeek]=[...next[toWeek],epId];
      }
      return next;
    });
    showToast(`Moved to Week ${toWeek} ✓`);
  },[showToast]);

  const handleRemoveFromSlot=useCallback((epId,fromWeek)=>{
    setSlots(prev=>{
      const next={...prev};
      next[fromWeek]=(next[fromWeek]||[]).filter(id=>id!==epId);
      return next;
    });
    showToast("Removed from schedule");
  },[showToast]);

  const doExport=useCallback(()=>{
    const blob=new Blob([JSON.stringify({eps,slots,month,dark},null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="Podsplan_"+(month||"plan").replace(/\s+/g,"_")+".json";
    a.click();URL.revokeObjectURL(a.href);
    showToast("Exported ✓");
  },[eps,slots,month,dark,showToast]);

  const doImportClick=useCallback(()=>fileRef.current?.click(),[]);

  const doImportFile=useCallback(e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(p.eps){setEps(p.eps);setSlots(p.slots||{1:[],2:[],3:[],4:[]});
          setMonth(p.month||"");if(p.dark!==undefined)setDark(p.dark);
          showToast("Imported ✓");}
      }catch{showToast("Invalid file");}
    };
    r.readAsText(f);e.target.value="";
  },[showToast]);

  const doReset=useCallback(()=>{
    if(!window.confirm("Reset all data?"))return;
    const e=mkEps();
    const s={1:[],2:[],3:[],4:[]};
    e.forEach((ep,i)=>{const wk=Math.floor(i/3)+1;if(wk<=4)s[wk].push(ep.id);});
    setEps(e);setSlots(s);setMonth("");setActiveId(null);
    showToast("Reset ✓");
  },[showToast]);

  const doDarkReport=useCallback(()=>{
    openReport(eps,slots,month||"Monthly Plan",LOGO_B64,true);
    showToast("Dark report opened ✓");
  },[eps,slots,month,showToast]);

  const doLightReport=useCallback(()=>{
    openReport(eps,slots,month||"Monthly Plan",LOGO_B64,false);
    showToast("Light report opened ✓");
  },[eps,slots,month,showToast]);

  const activeEp=eps.find(e=>e.id===activeId)??null;
  const filled=eps.filter(e=>e.guest).length;
  const filmed=eps.filter(e=>e.filmed).length;

  return(
    <Ctx.Provider value={T}>
    <div style={{fontFamily:"-apple-system,'Inter',sans-serif",background:T.bg,
      minHeight:"100vh",display:"flex",flexDirection:"column",transition:"background 0.3s"}}>

      {toast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",
          background:"#E94560",color:"#fff",padding:"9px 22px",borderRadius:9,
          fontSize:13,fontWeight:700,zIndex:999,whiteSpace:"nowrap",pointerEvents:"none",
          boxShadow:"0 4px 24px rgba(233,69,96,0.5)"}}>
          {toast}
        </div>
      )}

      <TopBar month={month} setMonth={setMonth} dark={dark} setDark={setDark}
        tab={tab} setTab={setTab}
        onDark={doDarkReport} onLight={doLightReport}
        onExport={doExport} onImport={doImportClick} onReset={doReset}
        filled={filled} filmed={filmed} fileRef={fileRef}/>

      <input ref={fileRef} type="file" accept=".json" onChange={doImportFile} style={{display:"none"}}/>

      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="guests"&&<GuestsTab eps={eps} activeId={activeId} onSelect={handleSelect}/>}
        {tab==="calendar"&&<CalendarTab eps={eps} slots={slots} activeId={activeId}
          onSelect={handleSelect} onMoveEp={handleMoveEp} onRemoveFromSlot={handleRemoveFromSlot}/>}
        {tab==="analysis"&&<Analysis eps={eps}/>}
      </div>

      {activeEp&&<Panel key={activeEp.id} ep={activeEp} onClose={handleClose} onUpdate={handleUpdate}/>}
    </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
